name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  migration-versions:
    name: Check duplicate migration versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for duplicate migration timestamps
        run: ./scripts/check-duplicate-migrations.sh

  php-static-analysis:
    name: PHP static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Determine diff base for Pint
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=HEAD^1" >> "$GITHUB_OUTPUT"
          fi

      - name: Pint (formatting, changed files only)
        run: ./vendor/bin/pint --test --diff=${{ steps.diff.outputs.base }}

      - name: Larastan
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  js-lint:
    name: JS lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint

  tests:
    name: PHP tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run test suite
        run: ./vendor/bin/phpunit
