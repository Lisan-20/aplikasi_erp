version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: aplikasi_erp_app
    restart: unless-stopped
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=4 --task-workers=4 --max-requests=10000
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - rs_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  webserver:
    image: nginx:alpine
    container_name: aplikasi_erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - rs_network
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: aplikasi_erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rs_network

networks:
  rs_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
