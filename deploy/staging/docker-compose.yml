services:
  app:
    build:
      context: ../..
      dockerfile: deploy/staging/Dockerfile
    image: simrs-staging-app:latest
    restart: unless-stopped
    env_file:
      - .env.staging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
      - app_public:/shared-public
    networks:
      - simrs_staging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "9091:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage:ro
    networks:
      - simrs_staging

volumes:
  storage_data:
  bootstrap_cache:
  app_public:

networks:
  simrs_staging:
    driver: bridge
